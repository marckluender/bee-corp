<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Bee-Corp: BeeBabaluga's Masterplan</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onclick="handleGlobalClick(event)">

    <div id="upgrade-overlay">
        <div class="overlay-content">
            <h1>🛒 Forschungs-Shop</h1>
            <div id="upgrade-list"></div>
            <button onclick="toggleUpgradeMenu(false)" class="btn-back">Zurück zum Stock</button>
        </div>
    </div>

    <div id="village-grid">
        <div id="top-alert-bar" onclick="toggleUpgradeMenu(true)">✨ NEUES UPGRADE VERFÜGBAR! ✨</div>

        <div class="plot" id="plot-wax">
            <div class="building-wrapper">
                <img id="wax-img" src="gfx/wax_0.png" class="building-img" alt="WaxStore">
                <div id="wax-placeholder" class="placeholder-ui">
                    <button id="buy-btn" class="btn-buy" onclick="buyStore('wax', event)" disabled>WaxStore (25
                        🍯)</button>
                </div>
            </div>
            <div id="wax-controls" class="building-controls">
                <div class="worker-stats">
                    👷 Bienen: <span id="wax-workers" class="stat-bold">0</span><br>
                    🍯 Produktion: <span id="wax-auto-prod">0.0</span>/5s
                </div>
                <button class="btn-add-worker bg-wax" onclick="addWorkerTo('wax', event)">+ Biene zuweisen</button>
            </div>
        </div>

        <div class="plot" id="plot-nektar">
            <div class="building-wrapper">
                <img id="nektar-img" src="gfx/nektar_0.png" class="building-img" alt="NektarStore">
                <div id="nektar-placeholder" class="placeholder-ui">
                    <button id="buy-nektar-btn" class="btn-buy bg-nektar-dark" onclick="buyStore('nektar', event)"
                        disabled>NektarStore (25 🍯)</button>
                </div>
            </div>
            <div id="nektar-controls" class="building-controls">
                <div class="worker-stats">
                    👷 Bienen: <span id="nektar-workers" class="stat-bold">0</span><br>
                    🌸 Produktion: <span id="nektar-auto-prod">0.0</span>/5s
                </div>
                <button class="btn-add-worker bg-nektar" onclick="addWorkerTo('nektar', event)">+ Biene
                    zuweisen</button>
            </div>
        </div>

        <div class="plot" id="plot-pollen" style="display: none;">
            <div class="building-wrapper">
                <img id="pollen-img" src="gfx/pollen_0.png" class="building-img" alt="Pollenakademie">
                <div id="pollen-placeholder" class="placeholder-ui">
                    <button id="buy-pollen-btn" class="btn-buy bg-pollen-dark" onclick="buyStore('pollen', event)"
                        disabled>Akademie (250 🍯)</button>
                </div>
            </div>
            <div id="pollen-controls" class="building-controls">
                <div class="worker-stats">
                    👷 Bienen: <span id="pollen-workers" class="stat-bold">0</span><br>
                    🐝 Rekrutierung: <span id="pollen-prod-val">0.0</span>/10s
                </div>
                <button class="btn-add-worker bg-pollen" onclick="addWorkerTo('pollen', event)">+ Biene
                    zuweisen</button>
            </div>
        </div>

        <div class="plot empty"></div>
    </div>

    <div id="control-panel">
        <div id="narrator-container" onmousedown="manualCollect(event)">
            <img src="gfx/BeeBabaluga.png" id="narrator-bg" alt="BeeBabaluga">
            <div id="narrator-text-box">
                <div id="narrator"></div>
            </div>
        </div>
        <div id="moderator-name-tag"></div>

        <div class="stats-box">
            <div class="stat-item">🌸 Nektar: <span id="nectar-val">0</span></div>
            <div class="stat-item">🍯 Honig: <span id="honey-val">0</span></div>
            <div class="stat-item">🐝 Freie Bienen: <span id="unemployed-val">0</span></div>
            <button id="shop-btn" class="btn-shop" onclick="toggleUpgradeMenu(true)">🛒 Forschungs-Shop</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
